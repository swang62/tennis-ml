apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prefect-server-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  labels:
    app: prefect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
        - name: prefect-server
          image: prefecthq/prefect:3.7.3-python3.11
          command:
            - /bin/bash
            - -c
            - |
              prefect server start --port 4200 &
              SERVER_PID=$!
              for i in $(seq 1 30); do
                python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/ready')" 2>/dev/null && break
                sleep 2
              done
              prefect work-pool create tennis-pool --type kubernetes 2>/dev/null || true
              wait $SERVER_PID

          envFrom:
            - configMapRef:
                name: tennis-default-config
          ports:
            - name: http
              containerPort: 4200
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: prefect-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  labels:
    app: prefect-server
spec:
  ports:
    - name: http
      port: 4200
      targetPort: http
  selector:
    app: prefect-server

# ---------------------------------------------------------------------------
# ClickHouse — columnar analytics database
# ---------------------------------------------------------------------------
# Single-node dev instance. HTTP API on port 8123, native protocol on 9000.
# ---------------------------------------------------------------------------

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  labels:
    app: clickhouse
data:
  prometheus.xml: |
    <clickhouse>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
        </prometheus>
    </clickhouse>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.5
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
            - name: metrics
              containerPort: 9363
          envFrom:
            - configMapRef:
                name: tennis-default-config
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/prometheus.xml
              subPath: prometheus.xml
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  type: NodePort
  ports:
    - name: http
      port: 8123
      nodePort: 30812
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
    - name: metrics
      port: 9363
      targetPort: metrics
  selector:
    app: clickhouse

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse
  labels:
    release: prometheus
spec:
  endpoints:
    - port: metrics
      path: /metrics
  selector:
    matchLabels:
      app: clickhouse
